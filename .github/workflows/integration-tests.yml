name: Integration Tests (Staging)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'typescript-sdk/**'
      - 'python-sdk/**'
      - 'integration-tests/**'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    paths:
      - 'typescript-sdk/**'
      - 'python-sdk/**'
      - 'integration-tests/**'
      - '.github/workflows/integration-tests.yml'

jobs:
  integration-tests:
    name: Integration Tests against staging-api.stair-ai.com
    runs-on: ubuntu-latest
    if: vars.SKIP_INTEGRATION_TESTS != 'true'

    steps:
      - uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # TypeScript setup
      # -------------------------------------------------------------------------
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      # -------------------------------------------------------------------------
      # Python setup
      # -------------------------------------------------------------------------
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -------------------------------------------------------------------------
      # Install dependencies
      # -------------------------------------------------------------------------
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python integration test dependencies
        working-directory: integration-tests/python
        run: uv sync

      # -------------------------------------------------------------------------
      # Health check — skip tests gracefully when staging is unreachable or
      # the API key is missing / invalid.
      # -------------------------------------------------------------------------
      - name: Check staging API health
        id: health
        env:
          STAIRAI_STAGING_API_KEY: ${{ secrets.STAIRAI_STAGING_API_KEY }}
        run: |
          # Step 1: Probe with a dummy key — healthy server returns 401.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://staging-api.stair-ai.com/v1/traces/00000000-0000-0000-0000-000000000000?limit=1" \
            -H "X-API-Key: health_probe" \
            --max-time 10) || STATUS=0
          if [ "$STATUS" != "401" ]; then
            echo "::warning::Staging API health probe returned HTTP $STATUS (expected 401) — skipping integration tests"
            echo "staging_up=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Step 2: Validate the real API key. Missing or invalid key → skip.
          if [ -z "$STAIRAI_STAGING_API_KEY" ]; then
            echo "::warning::STAIRAI_STAGING_API_KEY secret is not set — skipping integration tests"
            echo "staging_up=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEY_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://staging-api.stair-ai.com/v1/owners/me" \
            -H "X-API-Key: $STAIRAI_STAGING_API_KEY" \
            --max-time 10) || KEY_STATUS=0
          if [ "$KEY_STATUS" = "200" ]; then
            echo "staging_up=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::STAIRAI_STAGING_API_KEY is invalid (got HTTP $KEY_STATUS) — skipping integration tests"
            echo "staging_up=false" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------------------------------------------------------
      # Run tests
      # -------------------------------------------------------------------------
      - name: Run TypeScript integration tests
        if: steps.health.outputs.staging_up == 'true'
        working-directory: integration-tests/typescript
        env:
          STAIRAI_STAGING_API_KEY: ${{ secrets.STAIRAI_STAGING_API_KEY }}
          STAIRAI_STAGING_BASE_URL: https://staging-api.stair-ai.com
        run: pnpm test

      - name: Run Python integration tests
        if: steps.health.outputs.staging_up == 'true'
        working-directory: integration-tests/python
        env:
          STAIRAI_STAGING_API_KEY: ${{ secrets.STAIRAI_STAGING_API_KEY }}
          STAIRAI_STAGING_BASE_URL: https://staging-api.stair-ai.com
        run: uv run pytest -v

      # -------------------------------------------------------------------------
      # Summary
      # -------------------------------------------------------------------------
      - name: Integration tests passed
        if: steps.health.outputs.staging_up == 'true'
        run: |
          echo "✅ All integration tests passed against staging-api.stair-ai.com"
          echo "- TypeScript SDK lifecycle tests"
          echo "- Python SDK lifecycle tests"
          echo "- Cross-SDK synergy tests (both directions)"

      - name: Integration tests skipped (staging unavailable or key invalid)
        if: steps.health.outputs.staging_up == 'false'
        run: echo "⚠️ Staging API is unavailable or API key is invalid — integration tests were skipped"
